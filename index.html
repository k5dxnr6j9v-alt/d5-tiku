<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>D5配电施工安规题库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f6f8;color:#333;font-size:16px;line-height:1.6}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#fff;position:relative}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#1890ff 0%,#096dd9 100%);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(24,144,255,.2)}
.header-title{font-size:17px;font-weight:600}
.header-stats{font-size:13px;opacity:.9}
.progress-bar{height:3px;background:#e6f7ff;position:relative}
.progress-fill{height:100%;background:#52c41a;transition:width .3s ease}
.page{display:none;padding:16px;padding-bottom:80px}
.page.active{display:block}
.home-page{padding:30px 20px}
.home-title{text-align:center;font-size:22px;font-weight:700;color:#1890ff;margin-bottom:8px}
.home-subtitle{text-align:center;color:#888;font-size:14px;margin-bottom:30px}
.menu-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);cursor:pointer;display:flex;align-items:center;transition:transform .2s}
.menu-card:active{transform:scale(.98)}
.menu-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-right:16px;flex-shrink:0}
.menu-icon.blue{background:#e6f7ff;color:#1890ff}
.menu-icon.green{background:#f6ffed;color:#52c41a}
.menu-icon.orange{background:#fff7e6;color:#fa8c16}
.menu-icon.red{background:#fff1f0;color:#f5222d}
.menu-content{flex:1}
.menu-title{font-size:16px;font-weight:600;margin-bottom:4px}
.menu-desc{font-size:13px;color:#999}
.question-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.question-type{display:inline-block;padding:3px 10px;border-radius:4px;font-size:12px;margin-bottom:10px;font-weight:500}
.type-single{background:#e6f7ff;color:#1890ff}
.type-multi{background:#fff7e6;color:#fa8c16}
.type-judge{background:#f6ffed;color:#52c41a}
.question-number{color:#1890ff;font-weight:600;margin-right:6px}
.question-text{font-size:16px;line-height:1.7;margin-bottom:16px;color:#222}
.options{display:flex;flex-direction:column;gap:10px}
.option{padding:14px 16px;border:1.5px solid #e8e8e8;border-radius:10px;cursor:pointer;display:flex;align-items:flex-start;transition:all .2s;background:#fafafa}
.option:hover{border-color:#1890ff}
.option.disabled{pointer-events:none}
.option.correct{border-color:#52c41a;background:#f6ffed;color:#389e0d}
.option.wrong{border-color:#f5222d;background:#fff1f0;color:#cf1322}
.option.selected-multi{border-color:#1890ff;background:#e6f7ff}
.option-letter{width:26px;height:26px;border-radius:50%;background:#fff;border:1.5px solid #d9d9d9;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;margin-right:12px;flex-shrink:0;color:#666}
.option.correct .option-letter{background:#52c41a;border-color:#52c41a;color:#fff}
.option.wrong .option-letter{background:#f5222d;border-color:#f5222d;color:#fff}
.option-text{flex:1;padding-top:2px}
.answer-result{margin-top:16px;padding:12px 14px;border-radius:8px;font-size:14px;display:none}
.answer-result.show{display:block}
.answer-result.correct{background:#f6ffed;color:#389e0d;border:1px solid #b7eb8f}
.answer-result.wrong{background:#fff1f0;color:#cf1322;border:1px solid #ffa39e}
.answer-result strong{display:block;margin-bottom:4px}
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #f0f0f0;padding:10px 16px;display:flex;gap:10px;z-index:100}
.btn{flex:1;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s}
.btn:active{opacity:.8}
.btn-primary{background:linear-gradient(135deg,#1890ff,#096dd9);color:#fff}
.btn-outline{background:#fff;color:#1890ff;border:1px solid #1890ff}
.btn:disabled{opacity:.5;cursor:not-allowed}
.answer-card{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:12px}
.card-item{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;background:#f5f5f5;color:#666;border:1px solid #e8e8e8}
.card-item.correct{background:#f6ffed;color:#52c41a;border-color:#b7eb8f}
.card-item.wrong{background:#fff1f0;color:#f5222d;border-color:#ffa39e}
.card-item.current{box-shadow:0 0 0 2px #1890ff}
.card-legend{display:flex;gap:16px;margin-top:16px;font-size:12px;color:#888;justify-content:center;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:14px;height:14px;border-radius:3px}
.result-page{text-align:center;padding:40px 20px}
.result-score{font-size:64px;font-weight:700;color:#1890ff;margin:20px 0}
.result-info{display:flex;justify-content:space-around;margin:30px 0;padding:20px;background:#fafafa;border-radius:12px}
.result-item{text-align:center}
.result-item-value{font-size:24px;font-weight:600;color:#333}
.result-item-label{font-size:13px;color:#888;margin-top:4px}
.result-item-value.green{color:#52c41a}
.result-item-value.red{color:#f5222d}
.wrong-item{background:#fff;border-radius:10px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.04);cursor:pointer;border-left:4px solid #f5222d}
.wrong-question{font-size:14px;color:#333;line-height:1.6;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.wrong-meta{font-size:12px;color:#999}
.empty-state{text-align:center;padding:60px 20px;color:#bbb}
.empty-icon{font-size:48px;margin-bottom:12px}
.back-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:0 8px;margin-right:8px}
.header-left{display:flex;align-items:center}
.filter-tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.filter-tab{padding:8px 16px;border-radius:20px;background:#f5f5f5;font-size:13px;white-space:nowrap;cursor:pointer;border:none;color:#666}
.filter-tab.active{background:#1890ff;color:#fff}
</style>
</head>
<body>
<div class="app">
<div class="header">
<div class="header-left">
<button class="back-btn" onclick="goBack()" id="backBtn" style="display:none;">←</button>

</div>
<div class="header-stats" id="headerStats"></div>
</div>
<div class="progress-bar" id="progressBar" style="display:none;">

<!-- 首页 -->
<div class="page home-page active" id="homePage">
<div class="home-title">⚡ 配电施工安规题库</div>
<div class="home-subtitle">共150道题 · 单选/多选/判断</div>

</div>
</div>
<div class="menu-card" onclick="startRandom()">

<div class="menu-desc">随机打乱题目顺序练习</div>

</div>
<div class="menu-card" onclick="showWrongBook()">

</div>
</div>
<div class="menu-card" onclick="showAnswerCard()">
<div class="menu-icon orange">📋</div>
<div class="menu-content">
<div class="menu-title">答题卡</div>
<div class="menu-desc">查看答题进度和完成情况</div>
</div>
</div>
</div>

<!-- 刷题页面 -->
<div class="page" id="quizPage">
<div class="question-card">
<div><span class="question-type" id="questionType">单选题</span></div>
<div class="question-text">
<span class="question-number" id="questionNum">1/150</span>
<span id="questionText"></span>
</div>
<div class="options" id="optionsContainer"></div>
<div class="answer-result" id="answerResult"></div>
</div>
</div>

<!-- 答题卡页面 -->
<div class="page" id="cardPage">
<div class="question-card">
<div style="font-weight:600;margin-bottom:12px;">答题进度</div>
<div style="font-size:14px;color:#666;margin-bottom:8px;">
已答：<span id="cardAnswered">0</span> / 150
&nbsp;&nbsp; 正确：<span style="color:#52c41a;" id="cardCorrect">0</span>
&nbsp;&nbsp; 错误：<span style="color:#f5222d;" id="cardWrong">0</span>
</div>
<div class="answer-card" id="answerCardGrid"></div>
<div class="card-legend">
<div class="legend-item"><div class="legend-dot" style="background:#f5f5f5;"></div>未答</div>
<div class="legend-item"><div class="legend-dot" style="background:#f6ffed;border:1px solid #b7eb8f;"></div>正确</div>
<div class="legend-item"><div class="legend-dot" style="background:#fff1f0;border:1px solid #ffa39e;"></div>错误</div>
</div>
</div>
<div style="margin-top:16px;">
<button class="btn btn-primary" onclick="continueQuiz()">继续答题</button>
</div>
</div>

<!-- 错题本页面 -->
<div class="page" id="wrongPage">
<div class="filter-tabs">
<button class="filter-tab active" onclick="filterWrong('all')">全部</button>
<button class="filter-tab" onclick="filterWrong('single')">单选题</button>
<button class="filter-tab" onclick="filterWrong('multi')">多选题</button>
<button class="filter-tab" onclick="filterWrong('judge')">判断题</button>
</div>
<div id="wrongList"></div>
</div>

<!-- 结果页 -->
<div class="page result-page" id="resultPage">
<div style="font-size:18px;color:#666;">本次练习得分</div>
<div class="result-score" id="finalScore">0</div>
<div class="result-info">
<div class="result-item"><div class="result-item-value" id="resultTotal">0</div><div class="result-item-label">总题数</div></div>
<div class="result-item"><div class="result-item-value green" id="resultCorrect">0</div><div class="result-item-label">答对</div></div>
<div class="result-item"><div class="result-item-value red" id="resultWrong">0</div><div class="result-item-label">答错</div></div>
<div class="result-item"><div class="result-item-value" id="resultRate">0%</div><div class="result-item-label">正确率</div></div>
</div>
<button class="btn btn-primary" onclick="backToHome()" style="margin-top:20px;">返回首页</button>
</div>

<!-- 底部操作栏 -->
<div class="bottom-bar" id="bottomBar" style="display:none;">
<button class="btn btn-outline" onclick="showAnswerCard()">答题卡</button>
<button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>下一题</button>
</div>
</div>

<script>
// 题库数据
const Q = [
{id:1,t:"single",q:"依据配电安规，参与公司系统电气工作的外单位或外来人员，参加工作前应经考试合格，并经（ ）认可。",o:["调度控制中心","设备运维管理单位","施工单位","安全监察部门"],a:"B"},
{id:2,t:"single",q:"依据配电安规，在超过（    ）m深的基坑内作业时，向坑外抛掷土石应防止土石回落坑内，并做好防止土层塌方的临边防护措施。",o:["1","1.5","2","2.5"],a:"B"},
{id:3,t:"single",q:"依据配电安规，不应站在（    ）传递土石或放置传土工具。不应由下部掏挖土层。",o:["挡板上","撑木上","挡板、撑木上","脚手架上"],a:"C"},
{id:4,t:"single",q:"依据配电安规，因故间断电气工作连续（ ）及以上者，恢复工作前应重新学习本文件，并经考试合格。",o:["一个月","两个月","三个月","六个月"],a:"C"},
{id:5,t:"single",q:"依据配电安规，在居民区及交通道路附近开挖的基坑，应设坑盖或可靠遮栏，加挂警告标示牌，夜间挂（    ）。",o:["黄灯","绿灯","红灯","红外灯"],a:"C"},
{id:6,t:"single",q:"依据配电安规，现场作业人员进入作业现场应正确佩戴安全帽，还应穿（ ）。",o:["化纤长袖工作服、绝缘鞋","全棉长袖工作服、绝缘鞋","全棉短袖工作服、绝缘鞋","化纤短袖工作服、绝缘鞋"],a:"B"},
{id:7,t:"single",q:"依据配电安规，登杆塔前，应核对（    ）。",o:["杆号","线路名称和杆号","杆基","线路名称"],a:"B"},
{id:8,t:"single",q:"依据配电安规，遇有冲刷、起土、上拔或导地线、拉线松动的杆塔，登杆塔前，应先（    ）、打好临时拉线或支好架杆。",o:["培土加固","三交待","两穿一戴","测量接地电阻"],a:"A"},
{id:9,t:"single",q:"依据配电安规，攀登杆塔过程中应检查（    ）和金具锈蚀情况。",o:["纵向裂纹","横向裂纹","裂纹","绝缘子污染"],a:"B"},
{id:10,t:"single",q:"依据配电安规，作业人员攀登杆塔、杆塔上移位及杆塔上作业时，手扶的构件应（    ）。",o:["牢固","方便","灵活","耐用"],a:"A"},
{id:11,t:"single",q:"依据配电安规，在人员密集或有人员通过的地段进行杆塔上作业时，（    ）下方应按坠落半径设围栏或其他保护措施。",o:["杆塔","杆上人员","作业点","横担"],a:"C"},
{id:12,t:"single",q:"依据配电安规，杆塔上下无法避免垂直交叉作业时，应做好（    ）的措施，作业时要相互照应，密切配合。",o:["防物体打击","防落物伤人","防机械伤害","防触电"],a:"B"},
{id:13,t:"single",q:"依据配电安规，立、撤杆应设专人统一指挥。开工前，应交待施工方法、指挥信号和（    ）。",o:["安全措施","技术措施","组织措施","应急措施"],a:"A"},
{id:14,t:"single",q:"依据配电安规，立、撤杆塔时，基坑内不应有人。除指挥人及指定人员外，其他人员应在杆塔高度的（    ）倍距离以外。",o:["1.1","1.2","1.3","1.4"],a:"B"},
{id:15,t:"single",q:"依据配电安规，使用临时拉线时，一个锚桩上的临时拉线不应超过（    ）。",o:["一根","两根","三根","四根"],a:"B"},
{id:16,t:"single",q:"依据配电安规，利用已有杆塔立、撤杆，应检查杆塔（    ）及拉线和杆塔的强度，必要时应增设临时拉线或采取其他补强措施。",o:["基础","根部","中部","上部"],a:"B"},
{id:17,t:"single",q:"依据配电安规，使用倒落式抱杆立、撤杆，主牵引绳、尾绳、杆塔中心及抱杆顶应在一条直线上，抱杆下端部应固定牢固，抱杆顶部应设临时拉线，并由（    ）均匀调节控制。",o:["专责监护人","技术人员","工作负责人","有经验的人员"],a:"D"},
{id:18,t:"single",q:"依据配电安规，在交叉跨越各种线路、铁路、公路、河流等地方放线、撤线，应先取得有关（    ）同意，做好跨越架搭设、封航、封路、在路口设专人持信号旗看守等安全措施。",o:["主管部门","下属部门","经信部门","交通部门"],a:"A"},

{id:20,t:"single",q:"依据配电安规，放线、紧线时，遇接线头过滑轮、横担、树枝、房屋等处有卡、挂现象，应松线后处理。处理时操作人员应站在卡线处（    ）。",o:["内侧","外侧","下方","上方"],a:"B"},
{id:21,t:"single",q:"依据配电安规，（    ）采用突然剪断导线的做法撤线。",o:["宜","可以","不应","在保障安全前提下可"],a:"C"},
{id:22,t:"single",q:"依据配电安规，架空绝缘导线不应视为（    ）。",o:["绝缘设备","导电设备","承力设备","载流设备"],a:"A"},
{id:23,t:"single",q:"依据配电安规，在10kV带电杆塔上进行测量、防腐、巡视检查、紧杆塔螺栓、清除杆塔上异物等工作，作业人员活动范围及其所携带的工具、材料等与带电导线最小距离不应小于（    ）m。",o:["0.7","1","1.5","3"],a:"A"},

{id:26,t:"single",q:"依据配电安规，同杆（塔）架设多回线路中部分线路停电的工作，工作票中应填写多回线路中每回线路的（    ）。",o:["双重称号","双重名称","位置","线路属地"],a:"A"},
{id:27,t:"single",q:"依据配电安规，在带电导线附近使用绑线时，应在下面绕成小盘再带上杆塔。不应在杆塔上（    ）。",o:["卷绕或放开绑线","卷绕绑线","放开绑线","使用绑线"],a:"A"},
{id:28,t:"single",q:"依据配电安规，在配电站或高压室内搬动梯子、管子等长物，应（   ），并与带电部分保持足够的安全距离。",o:["放倒，由一人搬运","直立，由一人搬运","放倒，由两人搬运","直立，由两人搬运"],a:"C"},
{id:29,t:"single",q:"依据配电安规，电缆井、电缆隧道内工作时，通风设备应（    ）。",o:["时刻准备","随时开启","保持常开","间歇性开启"],a:"C"},

{id:150,t:"judge",q:"依据配电安规，起重设备长期或频繁地靠近架空线路或其他带电体作业时，应设置专人监护。",o:["正确","错误"],a:"B"}
];

// 全局变量
let idx = 0;
let list = [];
let ans = {};
let wrong = JSON.parse(localStorage.getItem("d5_wrong") || "[]");
let done = false;
let mode = "order";

// 初始化
window.onload = function(){ updateBadge(); };

// 更新错题数量角标
function updateBadge(){
  const b = document.getElementById("wrongCountBadge");
  b.textContent = wrong.length > 0 ? "("+wrong.length+"道)" : "";
}

// 切换页面
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const showBottom = (id === 'quizPage');
  document.getElementById('bottomBar').style.display = showBottom ? 'flex' : 'none';
  document.getElementById('progressBar').style.display = showBottom ? 'block' : 'none';
  document.getElementById('backBtn').style.display = (id !== 'homePage') ? 'block' : 'none';
}

// 返回
function goBack(){
  if(document.getElementById('quizPage').classList.contains('active')) backToHome();
  else if(document.getElementById('cardPage').classList.contains('active')) showPage('quizPage');
  else backToHome();
}

function backToHome(){
  showPage('homePage');
  document.getElementById('headerTitle').textContent = 'D5配电施工安规题库';
  document.getElementById('headerStats').textContent = '';
  updateBadge();
}

// 开始顺序刷题
function startPractice(){
  mode = "order";
  list = [...Q];
  idx = 0;
  ans = {};
  done = false;
  showPage('quizPage');
  document.getElementById('headerTitle').textContent = '顺序刷题';
  render();
}

// 开始随机刷题
function startRandom(){
  mode = "random";
  list = [...Q].sort(()=>Math.random()-0.5);
  idx = 0;
  ans = {};
  done = false;
  showPage('quizPage');
  document.getElementById('headerTitle').textContent = '随机刷题';
  render();
}

// 渲染题目
function render(){
  const q = list[idx];
  const typeMap = {single:'单选题',multi:'多选题',judge:'判断题'};
  const typeClass = {single:'type-single',multi:'type-multi',judge:'type-judge'};
  
  document.getElementById('questionType').textContent = typeMap[q.t];
  document.getElementById('questionType').className = 'question-type ' + typeClass[q.t];
  document.getElementById('questionNum').textContent = (idx+1)+'/'+list.length;
  document.getElementById('questionText').textContent = q.q;
  
  const letters = ['A','B','C','D','E'];
  let html = '';
  q.o.forEach((opt,i)=>{
    html += `<div class="option" data-l="${letters[i]}" onclick="pick('${letters[i]}')">
      <div class="option-letter">${letters[i]}</div>
      <div class="option-text">${opt}</div>
    </div>`;
  });
  document.getElementById('optionsContainer').innerHTML = html;
  document.getElementById('answerResult').className = 'answer-result';
  document.getElementById('answerResult').innerHTML = '';
  
  // 进度条
  document.getElementById('progressFill').style.width = ((idx+1)/list.length*100)+'%';
  
  // 顶部统计
  const cnt = Object.keys(ans).length;
  const right = Object.values(ans).filter(a=>a.ok).length;
  document.getElementById('headerStats').textContent = '已答'+cnt+' 对'+right;
  
  // 按钮
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('nextBtn').textContent = idx === list.length-1 ? '交卷' : '下一题';
  
  done = false;
  
  // 已答过则恢复
  if(ans[q.id]) restore(q);
}

// 恢复已答状态
function restore(q){
  done = true;
  const a = ans[q.id];
  document.querySelectorAll('.option').forEach(opt=>{
    opt.classList.add('disabled');
    const l = opt.dataset.l;
    if(q.a.includes(l)) opt.classList.add('correct');
    if(a.sel.includes(l) && !q.a.includes(l)) opt.classList.add('wrong');
  });
  const r = document.getElementById('answerResult');
  r.classList.add('show');
  if(a.ok){ r.classList.add('correct'); r.innerHTML = '<strong>✓ 回答正确</strong>'; }
  else{ r.classList.add('wrong'); r.innerHTML = '<strong>✗ 回答错误</strong>正确答案：'+q.a; }
  document.getElementById('nextBtn').disabled = false;
}

// 选择选项
function pick(l){
  if(done) return;
  const q = list[idx];
  
  if(q.t === 'multi'){
    const el = document.querySelector(`.option[data-l="${l}"]`);
    el.classList.toggle('selected-multi');
    const sel = document.querySelectorAll('.option.selected-multi').length;
    if(sel > 0){
      document.getElementById('nextBtn').disabled = false;
      document.getElementById('nextBtn').textContent = '确认答案';
    } else {
      document.getElementById('nextBtn').disabled = true;
      document.getElementById('nextBtn').textContent = idx===list.length-1?'交卷':'下一题';
    }
    return;
  }
  
  // 单选判断直接判分
  submit([l]);
}

// 提交答案
function submit(selected){
  done = true;
  const q = list[idx];
  const selStr = selected.sort().join('');
  const ok = selStr === q.a;
  
  document.querySelectorAll('.option').forEach(opt=>{
    opt.classList.add('disabled');
    const l = opt.dataset.l;
    if(q.a.includes(l)) opt.classList.add('correct');
    if(selected.includes(l) && !q.a.includes(l)) opt.classList.add('wrong');
  });
  
  ans[q.id] = {sel:selStr, ok:ok};
  
  // 错题本
  if(ok){
    wrong = wrong.filter(id=>id !== q.id);
  } else {
    if(!wrong.includes(q.id)) wrong.push(q.id);
  }
  localStorage.setItem("d5_wrong", JSON.stringify(wrong));
  
  const r = document.getElementById('answerResult');
  r.classList.add('show');
  if(ok){ r.classList.add('correct'); r.innerHTML = '<strong>✓ 回答正确</strong>'; }
  else{ r.classList.add('wrong'); r.innerHTML = '<strong>✗ 回答错误</strong>正确答案：'+q.a; }
  
  const cnt = Object.keys(ans).length;
  const right = Object.values(ans).filter(a=>a.ok).length;
  document.getElementById('headerStats').textContent = '已答'+cnt+' 对'+right;
  
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('nextBtn').textContent = idx===list.length-1?'交卷':'下一题';
}

// 下一题
function nextQuestion(){
  const q = list[idx];
  
  // 多选题未确认
  if(q.t === 'multi' && !done){
    const sel = [];
    document.querySelectorAll('.option.selected-multi').forEach(el=>sel.push(el.dataset.l));
    if(sel.length === 0){ alert('请至少选择一个选项'); return; }
    submit(sel);
    return;
  }
  
  if(idx < list.length - 1){
    idx++;
    render();
  } else {
    showResult();
  }
}

// 结果页
function showResult(){
  const total = list.length;
  const right = Object.values(ans).filter(a=>a.ok).length;
  const w = total - right;
  const rate = total>0 ? Math.round(right/total*100) : 0;
  const score = Math.round(right/total*100);
  
  document.getElementById('finalScore').textContent = score + '分';
  document.getElementById('resultTotal').textContent = total;
  document.getElementById('resultCorrect').textContent = right;
  document.getElementById('resultWrong').textContent = w;
  document.getElementById('resultRate').textContent = rate + '%';
  
  showPage('resultPage');
  document.getElementById('headerTitle').textContent = '练习结果';
  document.getElementById('bottomBar').style.display = 'none';
}

// 答题卡
function showAnswerCard(){
  if(list.length === 0){ alert('请先开始答题'); return; }
  const grid = document.getElementById('answerCardGrid');
  let html = '';
  list.forEach((q,i)=>{
    let cls = 'card-item';
    if(ans[q.id]) cls += ans[q.id].ok ? ' correct' : ' wrong';
    if(i === idx && document.getElementById('quizPage').classList.contains('active')) cls += ' current';
    html += `<div class="${cls}" onclick="jump(${i})">${i+1}</div>`;
  });
  grid.innerHTML = html;
  
  const cnt = Object.keys(ans).length;
  const right = Object.values(ans).filter(a=>a.ok).length;
  document.getElementById('cardAnswered').textContent = cnt;
  document.getElementById('cardCorrect').textContent = right;
  document.getElementById('cardWrong').textContent = cnt - right;
  
  showPage('cardPage');
  document.getElementById('headerTitle').textContent = '答题卡';
}

function jump(i){ idx = i; showPage('quizPage'); render(); }
function continueQuiz(){ showPage('quizPage'); }

// 错题本
function showWrongBook(){
  renderWrongList('all');
  showPage('wrongPage');
  document.getElementById('headerTitle').textContent = '错题本';
}

function filterWrong(type){
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  renderWrongList(type);
}

function renderWrongList(type){
  const box = document.getElementById('wrongList');
  let data = Q.filter(q=>wrong.includes(q.id));
  if(type !== 'all') data = data.filter(q=>q.t === type);
  
  if(data.length === 0){
    box.innerHTML = '<div class="empty-state"><div class="empty-icon">🎉</div><div>暂无错题，继续加油！</div></div>';
    return;
  }
  
  const typeMap = {single:'单选',multi:'多选',judge:'判断'};
  let html = '';
  data.forEach(q=>{
    html += `<div class="wrong-item" onclick="reviewWrong(${q.id})">
      <div class="wrong-question">${q.id}. ${q.q}</div>
      <div class="wrong-meta">${typeMap[q.t]} · 正确答案：${q.a}</div>
    </div>`;
  });
  box.innerHTML = html;
}

// 从错题本进入单题复习
function reviewWrong(id){
  list = Q.filter(q=>wrong.includes(q.id));
  idx = list.findIndex(q=>q.id === id);
  ans = {};
  done = false;
  mode = "wrong";
  showPage('quizPage');
  document.getElementById('headerTitle').textContent = '错题复习';
  render();
}
</script>
</body>
</html>
